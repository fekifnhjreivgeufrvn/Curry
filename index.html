<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a0f05">
<title>Curry Clicker</title>
<link rel="manifest" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-touch-callout:none}
html,body{
  width:100%;height:100%;overflow:hidden;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  font-family:'Nunito','Segoe UI',sans-serif;
  background:#1a0f05;color:#f5e6d0;
}
:root{
  --bg:#1a0f05;--panel:#1e0e04;--panel2:#2a1508;
  --accent:#d4720a;--accent2:#f5a83e;
  --text:#f5e6d0;--dim:#9e7c5a;--border:#3a1e08;
  --tc:#b5651d;--tg:rgba(181,101,29,.35);
  --hud-h:60px;--nav-h:66px;
}

/* ── SHELL ── */
#game{
  display:flex;flex-direction:column;
  height:100dvh;height:100vh;
  overflow:hidden;
}

/* ══════════════════════════════════════
   HUD  (top bar)
══════════════════════════════════════ */
#hud{
  flex-shrink:0;height:var(--hud-h);
  display:flex;align-items:center;gap:8px;
  padding:0 10px;
  background:linear-gradient(180deg,#080300 0%,#140b02 100%);
  border-bottom:2px solid var(--border);
  position:relative;z-index:20;
}
#title{
  font-family:'Fredoka One',cursive;font-size:1.2rem;
  color:var(--accent2);text-shadow:0 0 16px var(--accent);
  white-space:nowrap;flex-shrink:0;letter-spacing:.3px;
}
#stats{flex:1;min-width:0;text-align:center}
#bowl-count{
  font-family:'Fredoka One',cursive;font-size:1.5rem;line-height:1;
  color:var(--text);text-shadow:0 0 12px rgba(245,168,62,.2);
}
#cps-line{font-size:.65rem;color:var(--dim);margin-top:1px}
#hud-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
#tier-badge{
  font-family:'Fredoka One',cursive;font-size:.68rem;
  padding:3px 9px;border-radius:14px;
  background:var(--tc);color:#fff;white-space:nowrap;
  box-shadow:0 0 10px var(--tg);
  transition:background .6s,box-shadow .6s;
}
.hbtn{
  font-family:'Fredoka One',cursive;font-size:.68rem;
  padding:4px 8px;border-radius:10px;border:1px solid var(--border);
  background:var(--panel2);color:var(--text);cursor:pointer;
  transition:background .12s;white-space:nowrap;
  display:flex;align-items:center;gap:3px;line-height:1;
}
.hbtn:hover,.hbtn:active{background:var(--border)}
#prestige-btn{
  border-color:rgba(255,215,0,.5);color:gold;
  box-shadow:0 0 8px rgba(255,215,0,.18);
  display:none;
}
#prestige-btn.eligible{display:flex}

/* ══════════════════════════════════════
   PANELS WRAP
══════════════════════════════════════ */
#panels-wrap{
  flex:1;position:relative;overflow:hidden;
}

/* ── TAB PANELS (mobile: stacked, switch with opacity) ── */
.tab-panel{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  opacity:0;pointer-events:none;
  transition:opacity .14s ease;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.tab-panel::-webkit-scrollbar{width:3px}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tab-panel.active{opacity:1;pointer-events:auto}

/* ══════════════════════════════════════
   PLAY TAB
══════════════════════════════════════ */
#tab-play{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 55%,#271309 0%,#1a0f05 68%);
  overflow:hidden;
}
#tab-play::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.45;pointer-events:none;
}

#curry-wrap{
  position:relative;cursor:pointer;
  width:270px;height:270px;
  display:flex;align-items:center;justify-content:center;
  z-index:1;
}
#glow{
  position:absolute;inset:-30px;border-radius:50%;
  background:radial-gradient(circle,var(--tc) 0%,transparent 65%);
  opacity:.3;transition:background .6s;
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.5;transform:scale(1.07)}}
#curry-img{
  width:230px;height:230px;object-fit:contain;pointer-events:none;
  transition:filter .6s ease;filter:none;
  transform-origin:center bottom;
  animation:simmer 3.4s ease-in-out infinite;
}
#curry-wrap.pop #curry-img{animation:pop .13s ease forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(.87)}100%{transform:scale(1)}}
@keyframes simmer{
  0%,100%{transform:rotate(-.6deg) scale(1)}
  25%{transform:rotate(.4deg) scale(1.008)}
  50%{transform:rotate(-.3deg) scale(.996)}
  75%{transform:rotate(.6deg) scale(1.005)}
}

#play-info{
  margin-top:14px;z-index:1;text-align:center;
}
#cpc-info{
  font-family:'Fredoka One',cursive;font-size:.9rem;
  color:var(--dim);letter-spacing:.3px;
}
#total-line{font-size:.66rem;color:var(--dim);opacity:.55;margin-top:2px}
#spice-line{font-size:.66rem;color:var(--dim);opacity:.8;margin-top:2px}
#prestige-line{
  margin-top:5px;font-family:'Fredoka One',cursive;font-size:.72rem;
  color:gold;opacity:.85;display:none;
}

/* ── GOLDEN CURRY ── */
#golden-bowl{
  position:absolute;
  width:80px;height:80px;
  cursor:pointer;display:none;z-index:10;
  animation:goldenpulse .9s ease-in-out infinite;
}
#golden-bowl-img{
  width:80px;height:80px;object-fit:contain;display:block;
  filter:sepia(1) saturate(9) hue-rotate(5deg) brightness(1.45)
         drop-shadow(0 0 10px gold) drop-shadow(0 0 24px rgba(255,215,0,.7));
}
@keyframes goldenpulse{
  0%,100%{transform:scale(1) rotate(-4deg)}
  50%{transform:scale(1.18) rotate(4deg)}
}
#golden-timer{
  position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:.6rem;color:gold;
  white-space:nowrap;opacity:.8;
}

/* ══════════════════════════════════════
   UPGRADES & BUILDINGS TABS
══════════════════════════════════════ */
#tab-upgrades{background:var(--panel)}
#tab-buildings{background:var(--panel)}

.panel-title{
  font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--accent2);
  padding:10px 14px 7px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--panel);z-index:3;letter-spacing:.4px;
}
.panel-section{
  font-family:'Fredoka One',cursive;font-size:.68rem;color:var(--dim);
  padding:5px 14px 4px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.3);letter-spacing:.3px;
  position:sticky;top:37px;z-index:2;
}

/* ── BULK BUY ── */
#bulk-bar{
  display:flex;gap:5px;padding:7px 10px;
  border-bottom:1px solid var(--border);
  position:sticky;top:37px;background:var(--panel);z-index:2;
}
.bulk-btn{
  flex:1;font-family:'Fredoka One',cursive;font-size:.78rem;
  padding:6px 4px;border-radius:10px;border:1px solid var(--border);
  background:var(--panel2);color:var(--dim);cursor:pointer;
  transition:all .12s;
}
.bulk-btn.active{
  background:var(--accent);color:#fff;
  border-color:var(--accent);box-shadow:0 0 8px rgba(212,114,10,.5);
}
.bulk-btn:hover:not(.active),.bulk-btn:active:not(.active){background:var(--border);color:var(--text)}

/* ── UPGRADE ROWS ── */
.upg{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 14px;background:none;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;
  transition:background .12s;
}
.upg:hover:not(.dim):not(.owned),.upg:active:not(.dim):not(.owned){background:var(--panel2)}
.upg.owned{opacity:.28;cursor:default}
.upg.dim{opacity:.16;cursor:not-allowed}
.upg-icon{font-size:1.35rem;width:26px;height:26px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}.upg-icon img{width:100%;height:100%;object-fit:contain;display:block}.upg-icon.emoji{font-size:1.25rem;line-height:1}
.upg-info{flex:1;min-width:0}
.upg-name{font-weight:800;font-size:.82rem;line-height:1.2}
.upg-eff{font-size:.67rem;color:var(--dim)}
.upg-cost{font-family:'Fredoka One',cursive;font-size:.82rem;color:var(--accent2);white-space:nowrap}

/* ── BUILDING ROWS ── */
.bld{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:none;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;
  transition:background .12s;
}
.bld:hover:not(.dim),.bld:active:not(.dim){background:var(--panel2)}
.bld.dim{opacity:.16;cursor:not-allowed}
.bld-icon{font-size:1.5rem;width:28px;text-align:center;flex-shrink:0}
.bld-info{flex:1;min-width:0}
.bld-name{font-weight:800;font-size:.82rem;line-height:1.2}
.bld-cps{font-size:.66rem;color:var(--dim)}
.bld-right{text-align:right;flex-shrink:0}
.bld-cost{font-family:'Fredoka One',cursive;font-size:.76rem;color:var(--accent2);line-height:1.3}
.bld-count{font-family:'Fredoka One',cursive;font-size:1.25rem;color:var(--accent);line-height:1}
.bld-amt{font-size:.57rem;color:var(--dim);opacity:.7}

/* ══════════════════════════════════════
   BOTTOM NAV  (mobile only)
══════════════════════════════════════ */
#bottom-nav{
  flex-shrink:0;height:var(--nav-h);
  display:flex;align-items:stretch;
  background:linear-gradient(0deg,#060200 0%,#150a01 100%);
  border-top:2px solid var(--border);
  position:relative;z-index:20;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2px;background:none;border:none;
  color:var(--dim);cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:.6rem;
  letter-spacing:.4px;transition:color .15s;
  position:relative;-webkit-tap-highlight-color:transparent;
}
.nav-btn:active{opacity:.65}
.nav-icon{
  font-size:1.6rem;line-height:1;
  transition:transform .15s;display:block;
}
.nav-btn.active{color:var(--accent2)}
.nav-btn.active .nav-icon{transform:scale(1.18)}
.nav-btn.active::after{
  content:'';position:absolute;
  top:0;left:20%;right:20%;height:2.5px;
  background:var(--accent2);
  border-radius:0 0 4px 4px;
  box-shadow:0 0 8px var(--accent);
}

/* ══════════════════════════════════════
   DESKTOP  ≥ 720 px
══════════════════════════════════════ */
@media(min-width:720px){
  :root{--nav-h:0px}
  #game{
    display:grid;
    grid-template-rows:var(--hud-h) 1fr;
    grid-template-columns:260px 1fr 260px;
  }
  #hud{grid-column:1/-1}
  #panels-wrap{
    grid-column:1/-1;
    grid-row:2;
    display:grid;
    grid-template-columns:260px 1fr 260px;
    overflow:hidden;
  }
  /* All three panels always visible, side by side */
  .tab-panel{
    position:relative;inset:auto;
    opacity:1;pointer-events:auto;
    transition:none;
  }
  #tab-upgrades{border-right:2px solid var(--border)}
  #tab-buildings{border-left:2px solid var(--border)}
  #tab-play{position:relative}
  #bottom-nav{display:none}
  #title{font-size:1.45rem}
  #bowl-count{font-size:1.7rem}
}

/* ══════════════════════════════════════
   PARTICLES
══════════════════════════════════════ */
.pt{
  position:fixed;pointer-events:none;z-index:999;
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:var(--accent2);text-shadow:0 1px 4px rgba(0,0,0,.6);
  animation:fly .85s ease-out forwards;
}
.pt.gold{color:gold;font-size:1.2rem}
@keyframes fly{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-65px) scale(.65)}
}

/* ══════════════════════════════════════
   TOASTS
══════════════════════════════════════ */
#toasts{
  position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;
  transform:translateX(-50%);
  z-index:1000;display:flex;flex-direction:column;align-items:center;gap:7px;
  pointer-events:none;
}
.toast{
  background:linear-gradient(135deg,#2e1a08,#3d2010);
  border:1px solid var(--accent);border-radius:12px;
  padding:8px 16px;display:flex;align-items:center;gap:9px;
  font-size:.8rem;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.55);
  animation:tin .28s ease,tout .35s ease 2.65s forwards;
}
.toast.gold-toast{border-color:gold;box-shadow:0 4px 20px rgba(255,215,0,.25)}
@keyframes tin{from{opacity:0;transform:translateY(12px) scale(.92)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(6px)}}
.ti{font-size:1.1rem}
.tn{font-weight:800;color:var(--accent2)}
.td{color:var(--dim);font-size:.7rem}

/* ── TIER FLASH ── */
#flash{position:fixed;inset:0;pointer-events:none;z-index:998;opacity:0}
#flash.go{animation:flashgo .65s ease-out}
@keyframes flashgo{0%{opacity:.45}100%{opacity:0}}

/* ── STEAM ── */
.steam{
  position:fixed;pointer-events:none;z-index:997;
  width:6px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,200,120,.55) 0%,transparent 70%);
  animation:steamrise var(--dur,2.2s) ease-out forwards;
}
@keyframes steamrise{
  0%{opacity:.7;transform:translateY(0) translateX(0) scale(1)}
  40%{opacity:.5;transform:translateY(-40px) translateX(var(--sway,12px)) scale(1.6)}
  100%{opacity:0;transform:translateY(-110px) translateX(calc(var(--sway,12px)*1.4)) scale(.4)}
}

/* ── CPS FLOATER ── */
.cps-float{
  position:fixed;pointer-events:none;z-index:996;
  font-family:'Fredoka One',cursive;font-size:.75rem;
  color:rgba(245,168,62,.55);
  animation:cpsfly 1.6s ease-out forwards;
}
@keyframes cpsfly{
  0%{opacity:.7;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-44px)}
}

/* ══════════════════════════════════════
   MODALS
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.8);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;
  animation:mfadein .2s ease;
}
@keyframes mfadein{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--panel);border:2px solid var(--border);border-radius:18px;
  padding:22px;max-width:520px;width:92%;max-height:82vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:var(--border)}
.modal-title{
  font-family:'Fredoka One',cursive;font-size:1.25rem;color:var(--accent2);
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.modal-close{
  margin-left:auto;background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:1.1rem;padding:2px 7px;border-radius:7px;
  transition:color .12s,background .12s;line-height:1;
}
.modal-close:hover{color:var(--text);background:var(--panel2)}

/* ── ACHIEVEMENTS ── */
#ach-progress{
  font-size:.8rem;color:var(--dim);margin-bottom:12px;
  font-family:'Fredoka One',cursive;
}
.ach-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px;
}
.ach-card{
  background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:10px 8px;text-align:center;transition:border-color .2s;
}
.ach-card.unlocked{border-color:var(--accent)}
.ach-card.locked{opacity:.28;filter:grayscale(1)}
.ach-card-icon{font-size:1.65rem;margin-bottom:4px}
.ach-card-name{font-weight:800;font-size:.7rem;color:var(--text);line-height:1.3}
.ach-card-desc{font-size:.6rem;color:var(--dim);margin-top:2px;line-height:1.3}

/* ── PRESTIGE MODAL ── */
.prestige-info{
  background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.25);
  border-radius:12px;padding:14px;font-size:.82rem;line-height:1.7;
}
.prestige-info strong{color:gold}
.prestige-info p+p{margin-top:6px}
.modal-btns{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.mbtn{
  font-family:'Fredoka One',cursive;font-size:.88rem;
  padding:8px 20px;border-radius:10px;border:none;cursor:pointer;
  transition:filter .12s;
}
.mbtn:hover:not(:disabled){filter:brightness(1.15)}
.mbtn:disabled{opacity:.4;cursor:not-allowed}
.mbtn-cancel{background:var(--panel2);color:var(--dim);border:1px solid var(--border)}
.mbtn-confirm{background:gold;color:#1a0f05;font-size:.95rem}
</style>
</head>
<body>
<div id="game">

  <!-- ── HUD ── -->
  <div id="hud">
    <div id="title">🍛 Curry Clicker</div>
    <div id="stats">
      <div id="bowl-count">0 Bowls</div>
      <div id="cps-line">0 Bowls/sec</div>
    </div>
    <div id="hud-right">
      <div id="tier-badge">Japanese Curry</div>
      <button class="hbtn" onclick="showAchModal()">🏆 <span id="ach-count">0</span>/<span id="ach-total">0</span></button>
      <button class="hbtn" id="prestige-btn" onclick="showPrestigeModal()">✨ <span id="prestige-level"></span></button>
    </div>
  </div>

  <!-- ── PANELS ── -->
  <div id="panels-wrap">

    <!-- Upgrades Tab -->
    <div class="tab-panel" id="tab-upgrades">
      <div class="panel-title">⚡ Upgrades</div>
      <div id="upg-list"></div>
    </div>

    <!-- Play Tab -->
    <div class="tab-panel active" id="tab-play">
      <div id="curry-wrap">
        <div id="glow"></div>
        <img id="curry-img" src="food_curryrice_white.png" alt="Curry">
      </div>
      <div id="golden-bowl"><img id="golden-bowl-img" src="food_curryrice_white.png" alt="Golden Curry"><div id="golden-timer"></div></div>
      <div id="play-info">
        <div id="cpc-info">+1 Bowl per click</div>
        <div id="total-line">0 Bowls earned total</div>
        <div id="spice-line">Spice Tier: Non-Spicy</div>
        <div id="prestige-line"></div>
      </div>
    </div>

    <!-- Buildings Tab -->
    <div class="tab-panel" id="tab-buildings">
      <div class="panel-title">🏪 Buildings</div>
      <div id="bulk-bar">
        <button class="bulk-btn active" data-amt="1"   onclick="setBuyAmt(1)">×1</button>
        <button class="bulk-btn"        data-amt="10"  onclick="setBuyAmt(10)">×10</button>
        <button class="bulk-btn"        data-amt="100" onclick="setBuyAmt(100)">×100</button>
        <button class="bulk-btn"        data-amt="0"   onclick="setBuyAmt(0)">MAX</button>
      </div>
      <div id="bld-list"></div>
    </div>

  </div>

  <!-- ── BOTTOM NAV (mobile) ── -->
  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-upgrades" onclick="setTab('upgrades')">
      <span class="nav-icon">⚡</span>
      <span>Upgrades</span>
    </button>
    <button class="nav-btn active" id="nav-play" onclick="setTab('play')">
      <span class="nav-icon">🍛</span>
      <span>Cook</span>
    </button>
    <button class="nav-btn" id="nav-buildings" onclick="setTab('buildings')">
      <span class="nav-icon">🏪</span>
      <span>Shop</span>
    </button>
  </nav>

</div>

<!-- Achievements Modal -->
<div id="ach-modal" style="display:none" class="modal-overlay"
     onclick="if(event.target===this)closeAchModal()">
  <div class="modal-box">
    <div class="modal-title">
      🏆 Achievements
      <button class="modal-close" onclick="closeAchModal()">✕</button>
    </div>
    <div id="ach-progress"></div>
    <div id="ach-grid" class="ach-grid"></div>
  </div>
</div>

<!-- Prestige Modal -->

function curryCost(i) {
  if (i <= 0) return 0;
  if (i <= 10) {
    if (i === 1) return 10;
    if (i === 2) return 100;
    return 5 * Math.pow(10, i - 1);
  }
  const j = i - 11;
  if (j === 0) return 1e7;
  return Math.ceil(1e7 * Math.pow(5, j));
}

function curryClickMult(i) {
  if (i <= 10) return 1 + i;
  return 12 + (i - 11) * 2;
}

function buildCurryTypes() {
  const out = [];
  SPICE_TIERS.forEach((tier, tierIndex) => {
    tier.curries.forEach((c, slot) => {
      out.push({
        id: c.id,
        name: c.name,
        filter: c.filter,
        color: c.color,
        glow: c.glow,
        tierIndex,
        tierName: tier.name,
        tierUnlockAt: tier.unlockAt,
        slot,
        cost: curryCost(out.length),
        index: out.length,
        clickMult: curryClickMult(out.length),
      });
    });
  });
  return out;
}

// g = global building index (0 = Rice Pot … 9 = Steam Room … 10 = Rice Cooker T2 …)
// baseCost grows ×6.5 per step — continuous across tier boundaries, no price dip.
// baseCPS  grows ×5.5 per step — payback time slowly lengthens (~150 s → ~65 min).
function bldBaseCost(g) { return Math.round(15 * Math.pow(6.5, g)); }
function bldBaseCPS(g)  { return parseFloat((0.1 * Math.pow(5.5, g)).toPrecision(3)); }

function buildBuildings() {
  const out = [];
  SPICE_TIERS.forEach((tier, tierIndex) => {
    tier.buildings.forEach((b, slot) => {
      const g   = out.length;            // global index before push
      const arr = [b[0], b[1], b[2], b[3], bldBaseCPS(g), bldBaseCost(g)];
      arr.tierIndex    = tierIndex;
      arr.tierName     = tier.name;
      arr.tierUnlockAt = tier.unlockAt;
      arr.slot         = slot;
      out.push(arr);
    });
  });
  return out;
}

let S = {

  curryTier:0,
  spiceTier:0,
  u:[], b:{}, bu:[], ach:[],

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function fmt(n) {
  if (n >= 1e18) return (n/1e18).toFixed(2)+"Qi";
  if (n >= 1e15) return (n/1e15).toFixed(2)+"Qa";
  if (n >= 1e12) return (n/1e12).toFixed(2)+"T";
  if (n >= 1e9)  return (n/1e9).toFixed(2)+"B";
  if (n >= 1e6)  return (n/1e6).toFixed(2)+"M";
  if (n >= 1e3)  return (n/1e3).toFixed(2)+"K";
  return Math.floor(n)+"";
}

function bCost(b, extra=0) {
  return Math.ceil(b[5] * Math.pow(1.15, (S.b[b[0]]||0) + extra));
}

function bMulFor(bldId) {
  let m = 1;
  for (const u of BUILDING_UPGRADES)
    if (u.bldId === bldId && S.bu.includes(u.id)) m *= u.mul;
  return m;
}

function globalBonus() {
  return 1 + Math.log10((S.te || 0) + 1) * 0.08;
}

function clickBonus() {
  const cps = calcCPS();
  if (cps <= 0) return 0;
  return Math.min(Math.sqrt(cps) * 0.8, 250);
}

function calcCPC() {
  return (getCurryTier().clickMult + clickBonus()) * prestigeMul() * globalBonus();
}

function calcCPS() {
  let t = 0;
  for (const b of BUILDINGS) {
    const cnt = S.b[b[0]] || 0;
    if (!cnt) continue;
    t += cnt * b[4] * bMulFor(b[0]);
  }
  return t * prestigeMul() * globalBonus();
}

function prestigeMul() { return 1 + (S.prestige||0) * 0.25; }
function prestigeReq()  { return 5e6; }

function getCurryTierIndex() {
  if (typeof S.curryTier !== "number" || Number.isNaN(S.curryTier)) S.curryTier = 0;
  return Math.max(0, Math.min(CURRY_TYPES.length - 1, Math.floor(S.curryTier)));
}

function getCurryTier() {
  return CURRY_TYPES[getCurryTierIndex()];
}

function getSpiceTierIndex() {
  if (typeof S.spiceTier !== "number" || Number.isNaN(S.spiceTier)) S.spiceTier = 0;
  return Math.max(0, Math.min(SPICE_TIERS.length - 1, Math.floor(S.spiceTier)));
}

function getSpiceTier() {
  return SPICE_TIERS[getSpiceTierIndex()];
}

function getUnlockedSpiceTierIndex() {
  let idx = 0;
  for (let i = 0; i < SPICE_TIERS.length; i++) {
    if ((S.te || 0) >= SPICE_TIERS[i].unlockAt) idx = i;
  }
  return idx;
}

function syncSpiceTier() {
  const nextTier = Math.max(getSpiceTierIndex(), getUnlockedSpiceTierIndex(), S.maxSpiceTier || 0);
  S.spiceTier = nextTier;
  S.maxSpiceTier = Math.max(S.maxSpiceTier || 0, nextTier);
}

function getUnlockedCurryLimit() {
  return Math.min(((getSpiceTierIndex() + 1) * CURRY_BATCH_SIZE) - 1, CURRY_TYPES.length - 1);
}

function getUnlockedBuildingLimit() {
  return Math.min(((getSpiceTierIndex() + 1) * BUILDING_BATCH_SIZE) - 1, BUILDINGS.length - 1);
}

function getLastOwnedBuildingIndex() {
  for (let i = BUILDINGS.length - 1; i >= 0; i--) {
    if ((S.b[BUILDINGS[i][0]] || 0) > 0) return i;
  }
  return -1;
}

function getVisibleBuildingLimit() {
  const unlockedLimit = getUnlockedBuildingLimit();
  const lastOwned = getLastOwnedBuildingIndex();
  return Math.min(Math.max(lastOwned, 0) + 1, unlockedLimit + 1, BUILDINGS.length - 1);
}

function nextUnlockPct(have, need) {
  if (!need || !isFinite(need) || need <= 0) return 100;
  return Math.max(0, Math.min(100, Math.floor((have / need) * 100)));
}

function nextUnlockText(have, need) {
  return ` · Next unlock (${nextUnlockPct(have, need)}%)`;
}

function getBuildingCpsText(b, i, cnt, displayCost=null) {
  const bMul = bMulFor(b[0]);
  const unlockedLimit = getUnlockedBuildingLimit();
  const isNextLocked = cnt === 0 && i === Math.min(getVisibleBuildingLimit(), unlockedLimit + 1) && i > 0 && i > unlockedLimit;
  return cnt > 0 || i === 0
    ? `${b[3]} · ${fmt(cnt * b[4] * bMul)}/s`
    : isNextLocked
      ? `${b[3]}${nextUnlockText(S.bowls, displayCost ?? bCost(b, 0))}`
      : `${b[3]} · locked`;
}

// ── Optimised bulk buy (O(1) geometric series) ──
function getBulkCost(b, amt) {
  if (amt <= 0) return 0;
  const owned = S.b[b[0]]||0;
  const base  = b[5] * Math.pow(1.15, owned);
  return Math.ceil(base * (Math.pow(1.15, amt) - 1) / 0.15);
}

// ── Max buy with binary search ──
function getBuyAmt(b) {
  if (S.buyAmt !== 0) return S.buyAmt;
  if (S.bowls < bCost(b, 0)) return 0;
  let lo=1, hi=5000;
  while (lo < hi) {
    const mid = (lo+hi+1) >> 1;
    if (getBulkCost(b, mid) <= S.bowls) lo=mid; else hi=mid-1;
  }
  return lo;
}

function setTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const nb = document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
}

// ═══════════════════════════════════════════════

function load() {
  const raw = localStorage.getItem("cc4") || localStorage.getItem("cc3") || localStorage.getItem("cc2");
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    Object.assign(S, saved);
    S.bu           = S.bu || [];
    S.prestige     = S.prestige || 0;
    S.goldenClicks = S.goldenClicks || 0;
    S.buyAmt       = S.buyAmt || 1;
    S.maxCurryTier = S.maxCurryTier || 0;
    S.maxSpiceTier = S.maxSpiceTier || 0;

    const storedTier = Number.isFinite(Number(S.curryTier)) ? Math.floor(Number(S.curryTier)) : NaN;
    const storedMaxTier = Number.isFinite(Number(S.maxCurryTier)) ? Math.floor(Number(S.maxCurryTier)) : NaN;
    let tier = 0;
    if (Number.isFinite(storedTier)) tier = storedTier;
    if (Number.isFinite(storedMaxTier)) tier = Math.max(tier, storedMaxTier);

    if (!Number.isFinite(storedTier) && !Number.isFinite(storedMaxTier)) {
      const thresholds = CURRY_TYPES.map((_, i) => curryCost(i));
      for (let i = 0; i < thresholds.length; i++) {
        if ((S.te || 0) >= thresholds[i]) tier = i;
        else break;
      }
    }

    S.curryTier = Math.max(0, Math.min(CURRY_TYPES.length - 1, tier));
    syncSpiceTier();

    const elapsed = Math.min((Date.now()-(S.lastTick||Date.now()))/1000, 28800);
    const cps = calcCPS();
    if (elapsed > 5 && cps > 0) {
      const earned = cps * elapsed;
      S.bowls += earned; S.te += earned;
      setTimeout(()=>toast("😴","Welcome Back!","+"+fmt(earned)+" Bowls while away"), 800);
    }
    S.lastTick = Date.now();
  } catch(e) { console.warn("Save load failed", e); }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

let _prevTier = null;
let _prevSpiceTier = null;
let _dirty = true;

function render() {
  syncSpiceTier();
  S.cpc = calcCPC();
  S.cps = calcCPS();
  const curry = getCurryTier();
  const spice = getSpiceTier();

  document.getElementById("bowl-count").textContent = fmt(S.bowls)+" Bowls";
  document.getElementById("cps-line").textContent   = fmt(S.cps)+" Bowls/sec";
  const bonus = clickBonus();
  document.getElementById("cpc-info").textContent   = "+"+fmt(S.cpc)+" Bowl"+(S.cpc!==1?"s":"")+" per click"+(bonus>0?" · +"+fmt(bonus)+" active bonus":"");
  document.getElementById("total-line").textContent = fmt(S.te)+" Bowls earned total";

  const spiceLine = document.getElementById("spice-line");
  if (spiceLine) {
    const nextTier = SPICE_TIERS[getSpiceTierIndex() + 1];
    const unlocked = getSpiceTierIndex() >= 1;
    spiceLine.textContent = unlocked
      ? "Spice Tier: "+spice.name+" · next tier at "+fmt(nextTier ? nextTier.unlockAt : S.te)+" total bowls"
      : "Spice Tier: "+spice.name+" · unlocks at "+fmt(nextTier.unlockAt)+" total bowls";
    spiceLine.style.color = spice.color;
  }

  // Prestige display
  const pLine  = document.getElementById("prestige-line");
  const pLevel = document.getElementById("prestige-level");
  if (S.prestige > 0) {
    pLine.textContent = "✨ Prestige "+S.prestige+" · +"+(S.prestige*25)+"% to all production";
    pLine.style.display = "block";
    pLevel.textContent = "×"+S.prestige;
  } else {
    pLevel.textContent = "";
    pLine.style.display = "none";
  }

  document.getElementById("prestige-btn").classList.toggle("eligible", S.te >= prestigeReq());
  document.getElementById("ach-count").textContent = S.ach.length;
  document.getElementById("ach-total").textContent = ACHIEVEMENTS.length;

  // Curry type
  if (curry !== _prevTier) {
    document.getElementById("tier-badge").textContent      = curry.name;
    document.getElementById("tier-badge").style.background = curry.color;
    document.getElementById("tier-badge").style.boxShadow  = "0 0 12px "+curry.glow;
    document.getElementById("curry-img").style.filter      = curry.filter;
    document.getElementById("glow").style.background =
      "radial-gradient(circle,"+curry.color+" 0%,transparent 65%)";
    document.documentElement.style.setProperty("--tc", curry.color);
    if (_prevTier !== null) {
      const fl=document.getElementById("flash");
      fl.style.background=curry.color;
      fl.classList.remove("go"); void fl.offsetWidth; fl.classList.add("go");
      toast("🎉","Curry Upgraded!","Now cooking: "+curry.name);
    }
    _prevTier = curry;
  }

  if (spice !== _prevSpiceTier) {
    if (_prevSpiceTier !== null) {
      toast("🌶️","Spice Tier Unlocked!", spice.name+" tier is now available");
    }
    _prevSpiceTier = spice;
  }

  if (_dirty) renderPanels();
  else        updateAffordability();
  _dirty = false;
}

function updateAffordability() {
  // Click upgrades
  const upgBtns = document.querySelectorAll("#upg-list .upg:not(.bupg)");
  const current = getCurryTierIndex();
  const unlockedLimit = getUnlockedCurryLimit();
  CLICK_UPGRADES.forEach((u, i) => {
    const btn = upgBtns[i]; if (!btn) return;
    const owned = i <= current;
    const nextVisible = i === current + 1 && i <= unlockedLimit;
    const canBuy = nextVisible && S.bowls >= u.cost;
    btn.className = "upg" + (owned ? " owned" : (canBuy ? "" : " dim"));
    const effEl = btn.querySelector(".upg-eff");
    if (effEl) {
      effEl.textContent = u.effect + (nextVisible && !owned ? nextUnlockText(S.bowls, u.cost) : "");
    }
  });

  // Building upgrades
  const visibleBU = BUILDING_UPGRADES.filter(u =>
    !S.bu.includes(u.id) && (S.b[u.bldId] || 0) >= Math.ceil(u.reqCount * 0.5)
  );
  const buBtns = document.querySelectorAll("#upg-list .bupg");
  visibleBU.forEach((u, i) => {
    const btn = buBtns[i]; if (!btn) return;
    const cnt = S.b[u.bldId] || 0;
    const canBuy = cnt >= u.reqCount && S.bowls >= u.cost;
    btn.className = "upg bupg" + (canBuy ? "" : " dim");
  });

  // Buildings
  const bldBtns = document.querySelectorAll("#bld-list .bld");
  BUILDINGS.forEach((b, i) => {
    const btn = bldBtns[i]; if (!btn) return;
    const cnt = S.b[b[0]] || 0;
    const amt = getBuyAmt(b);
    const cost = amt > 0 ? getBulkCost(b, amt) : bCost(b, 0);
    const affordable = amt > 0 && S.bowls >= cost;
    btn.className = "bld" + (!affordable ? " dim" : "");
    const costEl = btn.querySelector(".bld-cost");
    const countEl = btn.querySelector(".bld-count");
    const cpsEl = btn.querySelector(".bld-cps");
    const amtEl = btn.querySelector(".bld-amt");
    if (costEl)  costEl.textContent  = fmt(amt > 0 ? cost : bCost(b, 0)) + " 🍚";
    if (countEl) countEl.textContent = cnt;
    if (amtEl)   amtEl.textContent   = S.buyAmt === 0 ? (amt > 0 ? "×" + amt : "×0") : "×" + S.buyAmt;
    if (cpsEl)   cpsEl.textContent   = getBuildingCpsText(b, i, cnt, cost);
  });
}

function renderPanels() {
  const ul = document.getElementById("upg-list");
  ul.innerHTML = "";

  const currentCurry = getCurryTierIndex();
  const unlockedCurryLimit = getUnlockedCurryLimit();
  const currentSpiceTier = getSpiceTierIndex();
  const totalTiers = SPICE_TIERS.length;

  for (let tierIndex = 0; tierIndex < totalTiers; tierIndex++) {
    const tier = SPICE_TIERS[tierIndex];
    const tierStartCurry = tierIndex * CURRY_BATCH_SIZE;
    const tierEndCurry = tierStartCurry + CURRY_BATCH_SIZE - 1;
    const tierStartBld = tierIndex * BUILDING_BATCH_SIZE;
    const tierEndBld = tierStartBld + BUILDING_BATCH_SIZE - 1;
    const isCurrentTier = tierIndex === currentSpiceTier;
    const isPastTier = tierIndex < currentSpiceTier;
    const isNextTier = tierIndex === currentSpiceTier + 1;
    if (tierIndex > currentSpiceTier + 1) continue;

    const section = document.createElement("div");
    section.className = "panel-section";
    if (isPastTier) {
      section.textContent = `🌶️ Tier ${tierIndex + 1} · ${tier.name}`;
    } else if (isCurrentTier) {
      section.textContent = `🌶️ Tier ${tierIndex + 1} · ${tier.name}`;
    } else {
      const pct = nextUnlockPct(S.te, tier.unlockAt);
      section.textContent = `🔒 Tier ${tierIndex + 1} · ${tier.name} · ${pct}%`;
    }
    ul.appendChild(section);

    // Curries
    for (let i = tierStartCurry; i <= tierEndCurry; i++) {
      const u = CLICK_UPGRADES[i];
      const owned = i <= currentCurry;
      const nextVisible = i === currentCurry + 1 && i <= unlockedCurryLimit;
      const futureLocked = i > unlockedCurryLimit;
      const btn = document.createElement("button");
      btn.className = "upg" + (owned ? " owned" : (nextVisible ? "" : " dim"));
      const labelText = owned
        ? "✓"
        : (futureLocked ? "Locked" : fmt(u.cost));
      const effText = `${u.effect}${nextVisible && !owned ? nextUnlockText(S.bowls, u.cost) : ""}`;
      btn.innerHTML =
        `<span class="upg-icon"><img class="curry-upg-icon" src="${u.icon}" alt="" style="filter:${u.filter};opacity:${owned ? 1 : 0.6}"></span>
         <span class="upg-info">
           <div class="upg-name">${u.name}</div>
           <div class="upg-eff">${effText}</div>
         </span>
         <span class="upg-cost">${labelText}</span>`;
      if (nextVisible && S.bowls >= u.cost) btn.onclick = () => buyUpg(u);
      ul.appendChild(btn);
    }

    // Building upgrades for this tier
    const tierBU = BUILDING_UPGRADES.filter(u => {
      const b = BUILDINGS.find(x => x[0] === u.bldId);
      return b && (b.tierIndex || 0) === tierIndex && !S.bu.includes(u.id) && (S.b[u.bldId] || 0) >= Math.ceil(u.reqCount * 0.5);
    });
    if (tierBU.length > 0) {
      const bs = document.createElement("div");
      bs.className = "panel-section";
      bs.textContent = `🏪 Tier ${tierIndex + 1} Building Upgrades`;
      ul.appendChild(bs);
      for (const u of tierBU) {
        const cnt = S.b[u.bldId] || 0;
        const canBuy = cnt >= u.reqCount && S.bowls >= u.cost;
        const btn = document.createElement("button");
        btn.className = "upg bupg" + (canBuy ? "" : " dim");
        const revealed = cnt >= u.reqCount;
        const note = revealed ? "×2 " + u.name.split(" ").slice(1).join(" ") + " CPS" : "Need " + u.reqCount + " " + u.bldId;
        btn.innerHTML =
          `<span class="upg-icon emoji" style="opacity:${revealed ? 1 : 0.6}">${u.icon}</span>
           <span class="upg-info">
             <div class="upg-name">${u.name}</div>
             <div class="upg-eff">${note}</div>
           </span>
           <span class="upg-cost">${fmt(u.cost)}</span>`;
        if (canBuy) btn.onclick = () => buyBldUpg(u);
        ul.appendChild(btn);
      }
    }
  }

  const bl = document.getElementById("bld-list");
  bl.innerHTML = "";
  for (let tierIndex = 0; tierIndex < totalTiers; tierIndex++) {
    if (tierIndex > currentSpiceTier + 1) continue;
    const tier = SPICE_TIERS[tierIndex];
    const tierStartBld = tierIndex * BUILDING_BATCH_SIZE;
    const tierEndBld = tierStartBld + BUILDING_BATCH_SIZE - 1;

    const header = document.createElement("div");
    header.className = "panel-section";
    if (tierIndex < currentSpiceTier) {
      header.textContent = `🏪 Tier ${tierIndex + 1} · ${tier.name}`;
    } else if (tierIndex === currentSpiceTier) {
      header.textContent = `🏪 Tier ${tierIndex + 1} · ${tier.name}`;
    } else {
      header.textContent = `🔒 Tier ${tierIndex + 1} · ${tier.name} · ${nextUnlockPct(S.te, tier.unlockAt)}%`;
    }
    bl.appendChild(header);

    for (let i = tierStartBld; i <= tierEndBld; i++) {
      const b = BUILDINGS[i];
      const cnt = S.b[b[0]] || 0;
      const amt = getBuyAmt(b);
      const cost = amt > 0 ? getBulkCost(b, amt) : bCost(b, 0);
      const affordable = amt > 0 && S.bowls >= cost;
      const btn = document.createElement("button");
      btn.className = "bld" + (!affordable ? " dim" : "");
      const amtLabel = S.buyAmt === 0 ? (amt > 0 ? "×" + amt : "×0") : "×" + S.buyAmt;
      const cpsText = getBuildingCpsText(b, i, cnt, cost);
      btn.innerHTML =
        `<span class="bld-icon">${b[2]}</span>
         <span class="bld-info">
           <div class="bld-name">${b[1]}</div>
           <div class="bld-cps">${cpsText}</div>
         </span>
         <span class="bld-right">
           <div class="bld-cost">${fmt(amt > 0 ? cost : bCost(b, 0))} 🍚</div>
           <div class="bld-amt">${amtLabel}</div>
           <div class="bld-count">${cnt}</div>
         </span>`;
      if (tierIndex <= currentSpiceTier + 1) btn.onclick = () => buyBld(b);
      bl.appendChild(btn);
    }
  }
}


// ═══════════════════════════════════════════════
// ACTIONS

// ═══════════════════════════════════════════════
function buyUpg(u) {
  const current = getCurryTierIndex();
  if (u.index !== current + 1) return;
  if (u.index > getUnlockedCurryLimit()) return;
  if (S.bowls < u.cost) return;
  S.bowls -= u.cost;
  S.curryTier = u.index;
  S.maxCurryTier = Math.max(S.maxCurryTier||0, u.index);
  toast("🍛", u.name, "Now serving: "+u.name);
  checkAch(); _dirty=true; render();
}

function buyBldUpg(u) {
  if (S.bu.includes(u.id)) return;
  if ((S.b[u.bldId]||0) < u.reqCount) {
    toast("⚠️","Not yet!","Need "+u.reqCount+" "+u.bldId+"s first"); return;
  }
  if (S.bowls < u.cost) return;
  S.bowls -= u.cost; S.bu.push(u.id);
  toast(u.icon, u.name, u.desc);
  checkAch(); _dirty=true; render();
}

function buyBld(b) {
  const amt = getBuyAmt(b);
  if (amt <= 0) return;
  const cost = getBulkCost(b, amt);
  if (S.bowls < cost) return;
  S.bowls -= cost;
  S.b[b[0]] = (S.b[b[0]]||0) + amt;
  checkAch(); _dirty=true; render();
}

function setBuyAmt(n) {
  S.buyAmt = n;
  document.querySelectorAll(".bulk-btn").forEach(btn => {
    btn.classList.toggle("active", +btn.dataset.amt === n);
  });
  _dirty=true; render();
}

// ═══════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════
const _tq=[]; let _tb=false;

function checkAch() {
  for (const a of ACHIEVEMENTS) {
    if (!S.ach.includes(a[0]) && a[4](S)) {
      S.ach.push(a[0]);
      toast(a[1], a[2], a[3]);
    }
  }
}

function toast(icon, title, desc, cls="") {
  _tq.push({icon,title,desc,cls});
  if (!_tb) nextToast();
}

function nextToast() {
  if (!_tq.length) { _tb=false; return; }
  _tb=true;
  const {icon,title,desc,cls} = _tq.shift();
  const c = document.getElementById("toasts");
  const t = document.createElement("div");
  t.className = "toast"+(cls?" "+cls:"");
  t.innerHTML = `<span class="ti">${icon}</span><div><div class="tn">${title}</div><div class="td">${desc}</div></div>`;
  c.appendChild(t);
  setTimeout(()=>{ t.remove(); setTimeout(nextToast,150); }, 3000);
}

function showAchModal() {
  document.getElementById("ach-modal").style.display = "flex";
  document.getElementById("ach-progress").textContent =
    S.ach.length+" / "+ACHIEVEMENTS.length+" unlocked";
  const grid = document.getElementById("ach-grid");
  grid.innerHTML = "";
  for (const a of ACHIEVEMENTS) {
    const unlocked = S.ach.includes(a[0]);
    const card = document.createElement("div");
    card.className = "ach-card "+(unlocked?"unlocked":"locked");
    card.innerHTML =
      `<div class="ach-card-icon">${a[1]}</div>
       <div class="ach-card-name">${unlocked?a[2]:"???"}</div>
       <div class="ach-card-desc">${unlocked?a[3]:"Keep playing..."}</div>`;
    grid.appendChild(card);
  }
}
function closeAchModal() { document.getElementById("ach-modal").style.display="none"; }

// ═══════════════════════════════════════════════
// PRESTIGE
// ═══════════════════════════════════════════════
function showPrestigeModal() {
  document.getElementById("prestige-modal").style.display = "flex";
  const eligible = S.te >= prestigeReq();
  const nextMul  = (1 + ((S.prestige||0)+1)*0.25).toFixed(2);
  document.getElementById("prestige-modal-body").innerHTML = `
    <div class="prestige-info">
      <p>Prestige resets your <strong>bowls, buildings, and upgrades</strong>.</p>
      <p>Your <strong>achievements are kept</strong> forever.</p>
      <p style="margin-top:10px">In return you gain a <strong>permanent +25% bonus</strong>
         to all CPS and click power, stacking with each prestige.</p>
      <p style="margin-top:10px">Current prestige: <strong>${S.prestige||0} ✨</strong></p>
      <p>After prestige: <strong>${nextMul}× total multiplier</strong></p>
      <p style="margin-top:10px;color:${eligible?"gold":"#ff7070"}">
        ${eligible?"✅ You qualify!":"❌ Need "+fmt(prestigeReq())+" total Bowls earned"}
        &nbsp;(you have ${fmt(S.te)})
      </p>
    </div>`;
  document.getElementById("prestige-confirm-btn").disabled = !eligible;
}
function closePrestigeModal() { document.getElementById("prestige-modal").style.display="none"; }

function doPrestige() {
  if (S.te < prestigeReq()) return;
  S.prestige = (S.prestige||0) + 1;
  S.bowls=0; S.te=0; S.tc=0; S.curryTier=0; S.u=[]; S.b={}; S.bu=[];
  S.cpc=1; S.cps=0; S.lastTick=Date.now();
  closePrestigeModal();
  _prevTier=null; _dirty=true; render();
  setTimeout(()=>{
    toast("✨","Ascended!","Prestige "+S.prestige+" · +"+(S.prestige*25)+"% permanent bonus");
    const fl=document.getElementById("flash");
    fl.style.background="gold";
    fl.classList.remove("go"); void fl.offsetWidth; fl.classList.add("go");
  },100);
  save();
}

// ═══════════════════════════════════════════════
// GOLDEN BOWL
// ═══════════════════════════════════════════════
let _goldenTimer=null, _goldenCD=0;

function scheduleGoldenBowl() {
  setTimeout(spawnGoldenBowl, 60000 + Math.random()*120000);
}

function spawnGoldenBowl() {
  const center = document.getElementById("tab-play");
  const bowl   = document.getElementById("golden-bowl");
  const cw = center.clientWidth, ch = center.clientHeight;
  bowl.style.left = (60 + Math.random()*(cw-160))+"px";
  bowl.style.top  = (60 + Math.random()*(ch-160))+"px";
  bowl.style.display = "block";
  _goldenCD = 15;
  document.getElementById("golden-timer").textContent = _goldenCD+"s";
  clearInterval(_goldenTimer);
  _goldenTimer = setInterval(()=>{
    _goldenCD--;
    document.getElementById("golden-timer").textContent = _goldenCD+"s";
    if (_goldenCD<=0) despawnGoldenBowl();
  }, 1000);
}

function despawnGoldenBowl() {
  clearInterval(_goldenTimer);
  document.getElementById("golden-bowl").style.display = "none";
  scheduleGoldenBowl();
}

function clickGoldenBowl(e) {
  e.stopPropagation();
  clearInterval(_goldenTimer);
  document.getElementById("golden-bowl").style.display = "none";
  const reward = Math.max(calcCPS()*300, 100);
  S.bowls += reward; S.te += reward;
  S.goldenClicks = (S.goldenClicks||0)+1;
  for (let i=0;i<8;i++) {
    const p = document.createElement("div");
    p.className = "pt gold"; p.textContent = "⭐";
    p.style.left = (e.clientX+(Math.random()-.5)*80)+"px";
    p.style.top  = (e.clientY+(Math.random()-.5)*60)+"px";
    p.style.animationDuration = (.4+Math.random()*.7)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
  toast("🌟","Golden Bowl!","+"+fmt(reward)+" Bowls — 5 min CPS!","gold-toast");
  checkAch(); _dirty=true; render();
  scheduleGoldenBowl();
}

// ═══════════════════════════════════════════════
// AMBIENT FX
// ═══════════════════════════════════════════════
let _steamInterval=null, _cpsFloatInterval=null;

function spawnSteam() {
  const wrap=document.getElementById("curry-wrap");
  const rect=wrap.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height*.38;
  for (let i=0;i<1+Math.floor(Math.random()*2);i++) {
    const s=document.createElement("div"); s.className="steam";
    const size=8+Math.random()*10, sway=(Math.random()-.5)*30, dur=1.8+Math.random()*1.2;
    s.style.cssText=`width:${size}px;height:${size}px;left:${cx+(Math.random()-.5)*40}px;top:${cy}px;--sway:${sway}px;--dur:${dur}s`;
    document.body.appendChild(s); setTimeout(()=>s.remove(),dur*1000);
  }
}

function spawnCPSFloat() {
  const cps=calcCPS(); if(cps<=0) return;
  const wrap=document.getElementById("curry-wrap"), rect=wrap.getBoundingClientRect();
  const f=document.createElement("div"); f.className="cps-float";
  f.textContent="+"+fmt(cps)+"/s";
  f.style.left=(rect.left+rect.width/2+(Math.random()-.5)*60-30)+"px";
  f.style.top=(rect.top+rect.height*.5)+"px";
  document.body.appendChild(f); setTimeout(()=>f.remove(),1600);
}

function startAmbient() {
  if(_steamInterval) clearInterval(_steamInterval);
  if(_cpsFloatInterval) clearInterval(_cpsFloatInterval);
  _steamInterval=setInterval(spawnSteam,700);
  _cpsFloatInterval=setInterval(spawnCPSFloat,2200);
}

// ═══════════════════════════════════════════════
// CLICK CURRY
// ═══════════════════════════════════════════════
function clickCurry(e) {
  const gained = calcCPC();
  S.bowls += gained;
  S.te    += gained;
  S.tc    += 1;

  // Pop animation on the bowl image
  const wrap = document.getElementById("curry-wrap");
  wrap.classList.remove("pop");
  void wrap.offsetWidth;
  wrap.classList.add("pop");

  // Floating number particles
  const cx = e.clientX, cy = e.clientY;
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "pt";
    p.textContent = "+" + fmt(gained);
    p.style.left = (cx + (Math.random() - 0.5) * 60) + "px";
    p.style.top  = (cy + (Math.random() - 0.5) * 30) + "px";
    p.style.animationDuration = (0.55 + Math.random() * 0.4) + "s";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }

  checkAch();
  _dirty = true;
  render();
}

// ═══════════════════════════════════════════════
// TICK
// ═══════════════════════════════════════════════
let _lastRender=0;
function tick() {
  const now=Date.now(), dt=(now-S.lastTick)/1000; S.lastTick=now;
  const earned=calcCPS()*dt;
  S.bowls+=earned; S.te+=earned;
  if(now-S.lastSave>30000){ save(); S.lastSave=now; }
  if(now-_lastRender>50){ checkAch(); render(); _lastRender=now; }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════
// PWA
// ═══════════════════════════════════════════════
function initPWA() {
  const mf={name:"Curry Clicker",short_name:"Curry Clicker",start_url:"./",display:"standalone",
    background_color:"#1a0f05",theme_color:"#d4720a",
    icons:[{src:"food_curryrice_white.png",sizes:"192x192",type:"image/png"}]};
  document.getElementById("manifest-link").href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:"application/json"}));
  if("serviceWorker"in navigator){
    const sw=`const C="curry-v3";
self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["./","./food_curryrice_white.png"]))));
self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  }
}


// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
load();
initPWA();
_prevTier = null;
_prevSpiceTier = null;

// Force the first render to sync the visible badge with the loaded tier.
// This avoids getting stuck on the HTML default (Japanese Curry) after reload.

const DEV_CHEAT = "dkfkdkfjdjfj";
let _devCheatBuffer = "";

document.getElementById("curry-wrap").addEventListener("click", clickCurry);
document.getElementById("golden-bowl").addEventListener("click", clickGoldenBowl);
window.addEventListener("beforeunload", save);
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", e=>{
  if ((e.key || "").length === 1) {
    _devCheatBuffer = (_devCheatBuffer + e.key.toLowerCase()).slice(-DEV_CHEAT.length);
    if (_devCheatBuffer === DEV_CHEAT) {
      _devCheatBuffer = "";
      const add = prompt("Dev cheat: how many bowls should be added?");
      const amt = Number(add);
      if (Number.isFinite(amt) && amt !== 0) {
        const gain = Math.floor(amt);
        S.bowls += gain;
        S.te += gain;
        toast("🛠️","Dev Cheat", (gain >= 0 ? "+" : "") + fmt(gain) + " Bowls added");
        _dirty = true;
        render();
        save();
      }
      return;
    }
  }
  if((e.code==="Space"||e.code==="Enter") && document.activeElement===document.body){
    e.preventDefault();
    const r=document.getElementById("tab-play").getBoundingClientRect();
    clickCurry({clientX:r.left+r.width/2, clientY:r.top+r.height/2});
  }
});

setBuyAmt(S.buyAmt||1);
requestAnimationFrame(tick);
render();
startAmbient();
scheduleGoldenBowl();
</script>
</body>
</html>
